[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Redirecionar todas as chamadas de API para o Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Garantir que o SPA (React) lida com as rotas do frontend
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
